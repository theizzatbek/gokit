groups:
  - name: auth
    prefix: /auth
    routes:
      - { method: POST, path: /login,   handler: auth.login }
      - { method: POST, path: /refresh, handler: auth.refresh }
      - { method: POST, path: /logout,  handler: auth.logout }
  - name: api
    prefix: /api
    middleware:
      - { bearer: ["required"] }
    routes:
      - method: GET
        path: /me
        handler: app.me
      - method: POST
        path: /posts
        handler: app.create_post
        middleware:
          - { require_scope: ["posts:write"] }
