# yaml-language-server: $schema=https://raw.githubusercontent.com/theizzatbek/gokit/main/fibermap/schema/routes.schema.json

# urlshort routes.
#
# `bearer` is a factory middleware registered by
# auth/fibermount.MountMiddlewareFactories; empty args list means
# "verify Bearer token, no extra scope/role check".

openapi:
  info:
    title: urlshort API
    version: 0.1.0
    description: gokit integration example — URL shortener.

groups:
  - prefix: /auth
    routes:
      - method: POST
        path: /register
        handler: users.register
        name: auth.register
        tags: [auth]
        summary: Register a new user
        # Brute-force / mass-signup guard: 1 rps, burst 5 per source
        # IP. Pairs with the unique-email constraint so a botnet can't
        # cheaply enumerate the registered user table.
        middleware:
          - rate_limit: ["1", "5"]
      - method: POST
        path: /login
        handler: users.login
        name: auth.login
        tags: [auth]
        summary: Verify credentials and issue access + refresh tokens
        # Credential-stuffing guard: 2 rps, burst 10 per source IP.
        # 429s expose the rate_limited Code so the client UI can show
        # a "slow down" message instead of leaking a "wrong password"
        # hint to the attacker.
        middleware:
          - rate_limit: ["2", "10"]
      - method: POST
        path: /refresh
        handler: users.refresh
        name: auth.refresh
        tags: [auth]
        summary: Rotate the refresh cookie and issue a fresh access token
        # Refresh-cookie probing: a legitimate client rotates once per
        # access-token lifetime (~15min), so 1 rps / burst 5 is very
        # generous. An attacker harvesting cookies would hit the cap
        # immediately.
        middleware:
          - rate_limit: ["1", "5"]
      - method: POST
        path: /logout
        handler: users.logout
        name: auth.logout
        tags: [auth]
        summary: Revoke the current refresh family and clear the cookie

  - prefix: /links
    middleware:
      - bearer: []
    routes:
      - method: POST
        path: ""
        handler: links.create
        name: links.create
        tags: [links]
        summary: Shorten a URL
        # Authenticated, but still rate-limited to cap a single
        # compromised token's mint rate. 5 rps sustained, burst 20
        # per source IP — far above what a normal UI emits, well
        # below what a runaway script would.
        middleware:
          - rate_limit: ["5", "20"]
      - method: GET
        path: ""
        handler: links.list
        name: links.list
        tags: [links]
        summary: List my links
      - method: GET
        path: /:code/stats
        handler: links.stats
        name: links.stats
        tags: [links]
        summary: Visit stats for a link (owner only)
      - method: DELETE
        path: /:code
        handler: links.delete
        name: links.delete
        tags: [links]
        summary: Delete a link (owner only)
      - method: PATCH
        path: /:code
        handler: links.update
        name: links.update
        tags: [links]
        summary: Update title / description of a link (owner only)

  - prefix: ""
    routes:
      - method: GET
        path: /:code
        handler: links.redirect
        name: links.redirect
        # Public endpoint — absorb scanner / bot traffic before it
        # reaches Redis or Postgres. 50 rps sustained, burst 100 per
        # source IP. Pairs with the cache layer's negative TTL: the
        # first 404 from a scan populates the negative cache, and
        # the rate limit prevents the scanner from probing many
        # codes per second.
        middleware:
          - rate_limit: ["50", "100"]
        tags: [redirect]
        summary: Follow a short code (public 302)
