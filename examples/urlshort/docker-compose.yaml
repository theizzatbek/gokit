services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urlshort
      POSTGRES_PASSWORD: urlshort
      POSTGRES_DB: urlshort
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshort"]
      interval: 1s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports: ["4222:4222"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
