# yaml-language-server: $schema=https://raw.githubusercontent.com/theizzatbek/gokit/main/fibermap/schema/routes.schema.json

# urlshort routes.
#
# `bearer` is a factory middleware registered by
# auth/fibermount.MountMiddlewareFactories; empty args list means
# "verify Bearer token, no extra scope/role check".

openapi:
  info:
    title: urlshort API
    version: 0.1.0
    description: gokit integration example — URL shortener.

groups:
  - prefix: /auth
    routes:
      - method: POST
        path: /register
        handler: users.register
        name: auth.register
        tags: [auth]
        summary: Register a new user
      - method: POST
        path: /login
        handler: users.login
        name: auth.login
        tags: [auth]
        summary: Verify credentials and issue access + refresh tokens
      - method: POST
        path: /refresh
        handler: users.refresh
        name: auth.refresh
        tags: [auth]
        summary: Rotate the refresh cookie and issue a fresh access token
      - method: POST
        path: /logout
        handler: users.logout
        name: auth.logout
        tags: [auth]
        summary: Revoke the current refresh family and clear the cookie

  - prefix: /links
    middleware:
      - bearer: []
    routes:
      - method: POST
        path: ""
        handler: links.create
        name: links.create
        tags: [links]
        summary: Shorten a URL
      - method: GET
        path: ""
        handler: links.list
        name: links.list
        tags: [links]
        summary: List my links
      - method: GET
        path: /:code/stats
        handler: links.stats
        name: links.stats
        tags: [links]
        summary: Visit stats for a link (owner only)
      - method: DELETE
        path: /:code
        handler: links.delete
        name: links.delete
        tags: [links]
        summary: Delete a link (owner only)

  - prefix: ""
    routes:
      - method: GET
        path: /:code
        handler: links.redirect
        name: links.redirect
        tags: [redirect]
        summary: Follow a short code (public 302)
