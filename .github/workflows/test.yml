name: test

on:
  push:
    branches: [main]
  pull_request:

# Pipeline:
#   static                gofmt + vet + warm module/build cache  (~15s)
#   ├─ unit-race          go test -race -short ./...             (~25s, hot)
#   └─ integration-matrix 4 parallel shards by container family:
#         pg              postgres + bitnamilegacy/postgresql
#         redis           redis
#         nats            nats
#         bundle          postgres + nats + minio (service smoke, s3,
#                          inboxnats/outboxnats cross-container)
#
# unit-race + integration-matrix declare `needs: static` so they reuse
# the module download + compiled-test cache that static populated.
# Without the dependency every parallel job would re-download modules
# from scratch (`actions/setup-go cache: true` only restores from a
# previous WORKFLOW RUN; parallel jobs within one run can't see each
# other's uploads).
#
# Each integration-matrix shard pulls ONLY the docker images it needs:
# explicit per-shard `images` list, per-shard cache key keyed on
# (shard name + manifest hash). Manifest .github/docker-images.txt
# stays as the central versioning source (touching it busts every
# shard's image cache). See docs/superpowers/specs/2026-06-10-ci-matrix-split-design.md
# for the package classification.
jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      # vet downloads the module graph + compiles every package — same
      # work the downstream jobs need. Doing it here once means
      # unit-race + integration boot with a hot $GOPATH/pkg/mod and
      # ~/.cache/go-build.
      - run: go vet ./...

  unit-race:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      # -short skips every package whose tests need Docker
      # (testcontainers). The race detector only runs against pure
      # unit code, which is where most concurrency bugs live anyway.
      - run: go test -race -short ./...

  integration-matrix:
    needs: static
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: pg
            images: postgres:16-alpine bitnamilegacy/postgresql:16
            packages: >-
              ./db ./db/sqb/... ./db/lock/... ./db/migrate/... ./db/jobs/...
              ./db/outbox ./db/inbox ./db/testdb/...
              ./auth/refreshpg/... ./auth/apikeypg/...
              ./audit/auditpg/... ./clients/webhooks/storepg/...
          - shard: redis
            images: redis:7-alpine
            packages: >-
              ./clients/redis/... ./clients/cache/... ./clients/ratelimit/...
              ./auth/refreshredis/... ./auth/sessionsredis/...
          - shard: nats
            images: nats:2-alpine
            packages: >-
              ./clients/nats/... ./clients/natsmap ./clients/natsmap/natsgw/...
          - shard: bundle
            images: postgres:16-alpine nats:2-alpine minio/minio:latest
            packages: >-
              ./service/... ./clients/s3/...
              ./db/inbox/inboxnats/... ./db/outbox/outboxnats/...
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      # Per-shard Docker image cache. Manifest .github/docker-images.txt
      # remains the central versioning source (touching it busts every
      # shard's cache). Each shard caches only its `matrix.images`
      # subset as tar archives.
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ~/docker-images
          key: ${{ runner.os }}-docker-images-${{ matrix.shard }}-${{ hashFiles('.github/docker-images.txt') }}
          restore-keys: ${{ runner.os }}-docker-images-${{ matrix.shard }}-

      - name: Load cached Docker images
        run: |
          if [ -d ~/docker-images ]; then
            for tar in ~/docker-images/*.tar; do
              [ -f "$tar" ] && docker load -i "$tar"
            done
          fi

      - name: Pull missing Docker images (shard subset)
        run: |
          mkdir -p ~/docker-images
          for image in ${{ matrix.images }}; do
            if ! docker image inspect "$image" > /dev/null 2>&1; then
              docker pull "$image"
              safe=$(echo "$image" | tr '/:' '__')
              docker save "$image" -o ~/docker-images/${safe}.tar
            fi
          done

      # No -race here: combining the race detector with the full
      # testcontainers stack tripled wall time without catching new
      # bugs in practice (race-prone code lives in the kit core,
      # covered by the unit-race job above).
      - run: go test ${{ matrix.packages }}
