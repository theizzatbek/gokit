name: test

on:
  push:
    branches: [main]
  pull_request:

# Pipeline:
#   static            gofmt + vet + warm module/build cache  (~15s)
#   ├─ unit-race      go test -race -short ./...             (~25s, hot cache)
#   └─ integration    go test ./...                          (~60s, hot cache)
#
# unit-race + integration declare `needs: static` so they reuse the
# module download + compiled-test cache that static populated. Without
# the dependency every parallel job would re-download modules from
# scratch (`actions/setup-go cache: true` only restores from a previous
# WORKFLOW RUN; parallel jobs within one run can't see each other's
# uploads).
jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      # vet downloads the module graph + compiles every package — same
      # work the downstream jobs need. Doing it here once means
      # unit-race + integration boot with a hot $GOPATH/pkg/mod and
      # ~/.cache/go-build.
      - run: go vet ./...

  unit-race:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      # -short skips every package whose tests need Docker
      # (testcontainers). The race detector only runs against pure
      # unit code, which is where most concurrency bugs live anyway.
      - run: go test -race -short ./...

  integration:
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache compiled tests
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-build-

      # Cache Docker images consumed by testcontainers-go. ~900MB of
      # tars (Bitnami Postgres alone is ~600MB) — pulling fresh on
      # every CI run costs 60-100s on a cold runner. Cache key hashes
      # .github/docker-images.txt so editing the manifest forces a
      # fresh pull. restore-keys allows partial reuse when only one
      # tag in the manifest changes.
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: ~/docker-images
          key: ${{ runner.os }}-docker-images-${{ hashFiles('.github/docker-images.txt') }}
          restore-keys: ${{ runner.os }}-docker-images-

      - name: Load cached Docker images
        run: |
          if [ -d ~/docker-images ]; then
            for tar in ~/docker-images/*.tar; do
              [ -f "$tar" ] && docker load -i "$tar"
            done
          fi

      - name: Pull missing Docker images
        run: |
          mkdir -p ~/docker-images
          while IFS= read -r image; do
            case "$image" in ''|\#*) continue ;; esac
            if ! docker image inspect "$image" > /dev/null 2>&1; then
              docker pull "$image"
              safe=$(echo "$image" | tr '/:' '__')
              docker save "$image" -o ~/docker-images/${safe}.tar
            fi
          done < .github/docker-images.txt

      # No -race here: combining the race detector with the full
      # testcontainers stack tripled wall time without catching new
      # bugs in practice (race-prone code lives in the kit core,
      # covered by the unit-race job above).
      - run: go test ./...
