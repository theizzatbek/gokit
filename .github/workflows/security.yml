name: security

# Dependency-vulnerability scanning with govulncheck. Runs on every PR
# and push to main for fast feedback, plus a nightly cron so a CVE
# disclosed against an already-merged dependency surfaces without
# waiting for the next PR.
#
# govulncheck is call-graph aware: it only fails when vulnerable symbols
# are actually reachable, so a finding here is real, not transitive
# noise. Static-analysis security scanning (gosec) is tracked separately
# — see docs/v1-readiness.md.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC nightly

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      # Install with the same Go the project builds with so the
      # source-processing packages match the module's language version.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan for known vulnerabilities
        run: "$(go env GOPATH)/bin/govulncheck ./..."
